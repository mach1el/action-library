name: Deploy (Ansible)

# Pull ansible-library and run its deploy playbook. All deploy config lives in
# ansible-library; the service repo needs only the vault-password secret.
#
#   jobs:
#     deploy:
#       uses: mach1el/action-library/.github/workflows/deploy-ansible.yml@master
#       with:
#         project: routing
#       secrets:
#         vault-password: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}

on:
  workflow_call:
    inputs:
      project:
        description: "Project key in ansible-library's projects table."
        type: string
        required: true
      ansible-library-ref:
        type: string
        required: false
        default: "master"
    secrets:
      vault-password:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout service repo
        uses: actions/checkout@v4

      - name: Checkout ansible-library
        uses: actions/checkout@v4
        with:
          repository: mach1el/ansible-library
          ref: ${{ inputs.ansible-library-ref }}
          path: .ansible-library

      - name: Deploy
        working-directory: .ansible-library
        env:
          VAULT_PASS: ${{ secrets.vault-password }}
        run: |
          set -euo pipefail
          pip install --quiet ansible-core
          ansible-galaxy collection install -r requirements.yml
          ansible-playbook playbooks/deploy.yml \
            -e project='${{ inputs.project }}' \
            -e src_base="$GITHUB_WORKSPACE" \
            --vault-password-file <(printf '%s' "$VAULT_PASS")
